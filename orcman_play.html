<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OrcMan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;display:flex;flex-direction:column;align-items:center;font-family:monospace;color:#fff;min-height:100vh;padding:10px 0}
#tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid #1e3668}
.tab{padding:8px 28px;cursor:pointer;background:#0f1a2e;color:#888;font-size:13px;font-family:monospace;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{background:#0a0a12;color:#ffd700;border-bottom:2px solid #ffd700}
.tab:hover:not(.active){color:#aaa;background:#12213a}
#game-panel{display:block}
#code-panel{display:none;width:800px;max-width:98vw}
pre{background:#0d1117;color:#c9d1d9;padding:16px;overflow:auto;font-size:12px;line-height:1.5;border:1px solid #1e3668;max-height:600px;border-radius:0 0 6px 6px;margin:0}
#ui{display:flex;gap:32px;margin-bottom:6px;font-size:17px;font-weight:bold;letter-spacing:2px;align-items:center;padding:4px 8px;background:#0f1a2e;border-radius:6px;width:800px;max-width:98vw;justify-content:space-between}
#sword-bar{display:flex;align-items:center;gap:4px;font-size:13px;color:#aef}
canvas{display:block;border:2px solid #1e3668;border-radius:4px}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);border-radius:12px;padding:24px 40px;text-align:center;pointer-events:none;z-index:10}
#gamewrap{position:relative;width:800px;max-width:98vw}
</style>
</head>
<body>
<div id="tabs">
  <button class="tab active" onclick="showTab('game')">▶ Play</button>
  <button class="tab" onclick="showTab('code')">{ } Source (Java)</button>
</div>
<div id="game-panel">
<div id="ui">
  <span id="lives-el" style="color:#f55">&#9829; 3</span>
  <span id="score-el" style="color:#ffd700">SCORE 0</span>
  <span id="level-el" style="color:#6cf">LVL 1</span>
  <div id="sword-bar"></div>
</div>
<div id="gamewrap">
  <canvas id="c" width="800" height="600"></canvas>
  <div id="msg">
    <div style="font-size:38px;color:#ffd700;letter-spacing:4px;font-weight:bold">ORCMAN</div>
    <div style="margin:10px 0 4px;color:#ccc;font-size:14px">Arrow keys / WASD &mdash; move</div>
    <div style="color:#ccc;font-size:14px">SPACE &mdash; swing sword (pick up &#9876; first!)</div>
    <div style="margin-top:14px;color:#aef;font-size:15px">Press <b>ENTER</b> to start</div>
  </div>
</div>
</div>
<div id="code-panel">
  <pre id="code-pre"></pre>
</div>

// ─────────────────────────────────────────────────────────────────────────────
class GamePanel extends JPanel implements ActionListener, KeyListener {

    };

    // Directions: 0=up 1=right 2=down 3=left
    static final int[][] DIR = {{0,-1},{1,0},{0,1},{-1,0}};

    // ── Sprites ─────────────────────────────────────────────────────────────
    BufferedImage[] soldierWalkFrames; // 8 frames
    BufferedImage[] soldierIdleFrames; // 6 frames
    BufferedImage[] orcWalkFrames;     // 8 frames
    BufferedImage swordItemImg;
    BufferedImage bgImg;

    // ── Game state ──────────────────────────────────────────────────────────
    int[][] maze;
    List&lt;Dot&gt; dots;
    Player player;
    List&lt;Orc&gt; orcs;

    int lives = 3, score = 0, level = 1;
    boolean gameRunning = false;
    boolean gameOver = false;

    // Sword pickup / attack state
    int swordsHeld = 0;
    boolean attackActive = false;
    int attackTimer = 0;          // ms remaining for swing animation
    static final int ATTACK_DUR = 300; // ms
    static final int ATTACK_RANGE = (int)(TILE * 1.6);

    // Level release delays for orcs (ms)
    static final int[] ORC_DELAYS = {0, 5000, 10000, 15000};

    // ── Timer ───────────────────────────────────────────────────────────────
    javax.swing.Timer gameTimer;
    long lastTime;

    // ── Keys ────────────────────────────────────────────────────────────────
    boolean[] keys = new boolean[256];

    // ── Screen state ────────────────────────────────────────────────────────
    static final int SCREEN_TITLE  = 0;

    boolean transitioning = false;

    // ─────────────────────────────────────────────────────────────────────────
    GamePanel() {
        setPreferredSize(new Dimension(W, H + UI_H));
        setBackground(Color.BLACK);
        addKeyListener(this);
        setFocusable(true);
        loadSprites();
        gameTimer = new javax.swing.Timer(16, this);
        gameTimer.start();
        lastTime = System.currentTimeMillis();
    }

    // ── Sprite loading ───────────────────────────────────────────────────────
    void loadSprites() {
        try {
            soldierWalkFrames = splitSheet(decodeB64(Assets.SOLDIER_WALK), 8);
            soldierIdleFrames = splitSheet(decodeB64(Assets.SOLDIER_IDLE), 6);
            orcWalkFrames     = splitSheet(decodeB64(Assets.ORC_WALK),     8);
            swordItemImg      = decodeB64(Assets.SWORD_ITEM);
            bgImg             = decodeB64(Assets.BACKGROUND);
        } catch (Exception e) {
            e.printStackTrace();
        }
    }

    BufferedImage decodeB64(String b64) throws Exception {
        byte[] bytes = Base64.getDecoder().decode(b64);
        return ImageIO.read(new ByteArrayInputStream(bytes));
    }

    BufferedImage[] splitSheet(BufferedImage sheet, int count) {
        int fw = sheet.getWidth() / count;
        BufferedImage[] frames = new BufferedImage[count];
        for (int i = 0; i &lt; count; i++)
            frames[i] = sheet.getSubimage(i * fw, 0, fw, sheet.getHeight());
        return frames;
    }

    // ── Level init ───────────────────────────────────────────────────────────
    void initLevel() {
        maze = new int[ROWS][COLS];
        for (int r = 0; r &lt; ROWS; r++)
            maze[r] = Arrays.copyOf(MAZE_BASE[r], COLS);

        dots = new ArrayList&lt;&gt;();
        for (int r = 0; r &lt; ROWS; r++)
            for (int c = 0; c &lt; COLS; c++)
                if (maze[r][c] == 0)
                    dots.add(new Dot(c, r));

        // Place swords: 5 swords on level 1, fewer each level (min 0)
        int swordCount = Math.max(0, 5 - (level - 1));
        // Pick random dots to become swords (avoid the player start tile)
        List&lt;Dot&gt; candidates = new ArrayList&lt;&gt;();
        for (Dot d : dots)
            if (!(d.col == 9 &amp;&amp; d.row == 7)) candidates.add(d);
        Collections.shuffle(candidates, new Random());
        for (int i = 0; i &lt; Math.min(swordCount, candidates.size()); i++)
            candidates.get(i).isSword = true;

        // Player
        player = new Player(9, 7);
        swordsHeld = 0;
        attackActive = false;
        attackTimer = 0;

        // Orcs
        int[][] corners = {{1,1},{18,1},{1,13},{18,13}};
        long now = System.currentTimeMillis();
        orcs = new ArrayList&lt;&gt;();
        for (int i = 0; i &lt; 4; i++) {
            Orc o = new Orc(corners[i][0], corners[i][1], i);
            o.speed = 70 + i * 8 + (level - 1) * 5;
            o.releaseTime = now + ORC_DELAYS[i];
            o.active = false;
            orcs.add(o);
        }

        transitioning = false;
        transTimer = 0;
    }

    // ── Collision helper ──────────────────────────────────────────────────────
    boolean canMove(int col, int row) {
        if (col &lt; 0 || col &gt;= COLS || row &lt; 0 || row &gt;= ROWS) return false;
        return maze[row][col] == 0;
    }

    int pixToTileCol(double px) { return (int) Math.round((px - TILE / 2.0) / TILE); }
    int pixToTileRow(double py) { return (int) Math.round((py - TILE / 2.0) / TILE); }
    double tileCX(int col) { return col * TILE + TILE / 2.0; }
    double tileCY(int row) { return row * TILE + TILE / 2.0; }

    // ── Update ────────────────────────────────────────────────────────────────
    @Override
    public void actionPerformed(ActionEvent e) {
        long now = System.currentTimeMillis();
        int dt = (int) Math.min(now - lastTime, 50);
        lastTime = now;

        if (screen == SCREEN_PLAY) {
            if (!transitioning) update(dt, now);
        }
        repaint();
    }

    void update(int dt, long now) {
        if (player.dead) {
            player.deathTimer -= dt;
            if (player.deathTimer &lt;= 0) {
                lives--;
                if (lives &lt;= 0) { screen = SCREEN_OVER; return; }
                initLevel();
            }
            return;
        }

        // ── Attack ──
        if (attackActive) {
            attackTimer -= dt;
            if (attackTimer &lt;= 0) attackActive = false;
        }

        // ── Player movement ──
        updateEntity(player, dt);

        // ── Eat dot / pick up sword ──
        int pc = pixToTileCol(player.x), pr = pixToTileRow(player.y);
        for (Dot d : dots) {
            if (!d.eaten &amp;&amp; d.col == pc &amp;&amp; d.row == pr) {
                d.eaten = true;
                if (d.isSword) {
                    swordsHeld++;
                } else {
                    score += 10;
                }
            }
        }

        // ── Level clear ──
        boolean allEaten = true;
        for (Dot d : dots) if (!d.eaten) { allEaten = false; break; }
        if (allEaten) {
            level++;
            transitioning = true;
            transTimer = 900;
            javax.swing.Timer t = new javax.swing.Timer(900, ev -&gt; {
                initLevel();
                ((javax.swing.Timer)ev.getSource()).stop();
            });
            t.setRepeats(false);
            t.start();
            return;
        }

        // ── Orcs ──
        for (Orc o : orcs) {
            if (o.dead) {
                o.deathTimer -= dt;
                continue;
            }
            if (!o.active) {
                if (now &gt;= o.releaseTime) o.active = true;
                else continue;
            }

            updateEntity(o, dt);

            // Collision with player
            double dx = o.x - player.x, dy = o.y - player.y;
            double dist = Math.sqrt(dx * dx + dy * dy);
            if (dist &lt; TILE * 0.68 &amp;&amp; !player.dead) {
                player.dead = true;
                player.deathTimer = 1800;
            }
        }
    }

    // Generic entity movement (works for both player and orc)
    void updateEntity(Entity ent, int dt) {
        ent.frameTimer += dt;
        if (ent.frameTimer &gt;= ent.frameDur) {
            ent.frameTimer = 0;
            ent.frame = (ent.frame + 1) % ent.frameCount;
        }

        // Try queued direction
        if (ent instanceof Player) {
            Player p = (Player) ent;
            int[] nd = DIR[p.nextDir];
            int tc = pixToTileCol(p.x), tr = pixToTileRow(p.y);
            if (canMove(tc + nd[0], tr + nd[1])) {
                // Align on perpendicular axis
                if (nd[0] != 0) p.y = tileCY(tr);
                if (nd[1] != 0) p.x = tileCX(tc);
                p.dir = p.nextDir;
                if (nd[0] != 0) p.facing = nd[0];
            }
        } else {
            Orc o = (Orc) ent;
            int oc = pixToTileCol(o.x), or_ = pixToTileRow(o.y);
            double distX = Math.abs(o.x - tileCX(oc));
            double distY = Math.abs(o.y - tileCY(or_));
            if (distX &lt; 2 &amp;&amp; distY &lt; 2) {
                o.x = tileCX(oc); o.y = tileCY(or_);
                // AI: pick direction
                int rev = (o.dir + 2) % 4;
                List&lt;Integer&gt; valid = new ArrayList&lt;&gt;(), any = new ArrayList&lt;&gt;();
                for (int i = 0; i &lt; 4; i++) {
                    if (canMove(oc + DIR[i][0], or_ + DIR[i][1])) {
                        any.add(i);
                        if (i != rev) valid.add(i);
                    }
                }
                List&lt;Integer&gt; choices = valid.isEmpty() ? any : valid;
                if (!choices.isEmpty()) {
                    int pc = pixToTileCol(player.x), pr = pixToTileRow(player.y);
                    if (Math.random() &lt; 0.65) {
                        int best = choices.get(0); int bestD = Integer.MAX_VALUE;
                        for (int di : choices) {
                            int nx = oc + DIR[di][0], ny = or_ + DIR[di][1];
                            int d2 = Math.abs(nx - pc) + Math.abs(ny - pr);
                            if (d2 &lt; bestD) { bestD = d2; best = di; }
                        }
                        o.dir = best;
                    } else {
                        o.dir = choices.get((int)(Math.random() * choices.size()));
                    }
                    if (DIR[o.dir][0] != 0) o.facing = DIR[o.dir][0];
                }
            }
        }

        // Move
        int[] d = DIR[ent.dir];
        double nx = ent.x + d[0] * ent.speed * dt / 1000.0;
        double ny = ent.y + d[1] * ent.speed * dt / 1000.0;
        int nc = pixToTileCol(nx), nr = pixToTileRow(ny);
        if (canMove(nc, nr)) {
            ent.x = nx; ent.y = ny;
            int tc = pixToTileCol(ent.x), tr = pixToTileRow(ent.y);
            if (d[0] != 0) ent.y = tileCY(tr);
            if (d[1] != 0) ent.x = tileCX(tc);
        } else {
            int tc = pixToTileCol(ent.x), tr = pixToTileRow(ent.y);
            ent.x = tileCX(tc); ent.y = tileCY(tr);
        }
    }

    // ── Attack ───────────────────────────────────────────────────────────────
    void doAttack() {
        if (!gameRunning || player.dead || swordsHeld &lt;= 0 || attackActive) return;
        swordsHeld--;
        attackActive = true;
        attackTimer = ATTACK_DUR;
        // Kill orcs in range (in facing direction cone)
        for (Orc o : orcs) {
            if (o.dead || !o.active) continue;
            double dx = o.x - player.x, dy = o.y - player.y;
            double dist = Math.sqrt(dx * dx + dy * dy);
            if (dist &gt; ATTACK_RANGE) continue;
            // Check it's roughly in front of player
            double dot = dx * player.facing + dy * 0;
            // Simple: within ATTACK_RANGE counts regardless of angle for fairness
            o.dead = true;
            o.deathTimer = 800;
            score += 200;
        }
    }

    // ── Paint ─────────────────────────────────────────────────────────────────
    @Override
    protected void paintComponent(Graphics g) {
        super.paintComponent(g);
        Graphics2D g2 = (Graphics2D) g;
        g2.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON);

        // UI bar
        drawUI(g2);

        // Offset for UI
        g2.translate(0, UI_H);

        if (screen == SCREEN_TITLE) {
            drawTitle(g2);
        } else if (screen == SCREEN_PLAY || screen == SCREEN_OVER) {
            drawGame(g2);
            if (transitioning) drawLevelBanner(g2);
            if (screen == SCREEN_OVER) drawGameOver(g2);
        }
    }

    void drawUI(Graphics2D g2) {
        g2.setColor(new Color(10, 10, 20));
        g2.fillRect(0, 0, W, UI_H);
        g2.setColor(new Color(40, 60, 120));
        g2.drawLine(0, UI_H - 1, W, UI_H - 1);

        g2.setFont(new Font("Monospaced", Font.BOLD, 20));
        // Lives
        g2.setColor(new Color(255, 80, 80));
        g2.drawString("♥ " + lives, 16, 32);
        // Score
        g2.setColor(new Color(255, 215, 0));
        String sc = "SCORE " + score;
        FontMetrics fm = g2.getFontMetrics();
        g2.drawString(sc, (W - fm.stringWidth(sc)) / 2, 32);
        // Level
        g2.setColor(new Color(100, 200, 255));
        String lv = "LVL " + level;
        g2.drawString(lv, W - fm.stringWidth(lv) - 16, 32);
        // Swords
        if (swordsHeld &gt; 0 &amp;&amp; swordItemImg != null) {
            int sx = W - 120;
            for (int i = 0; i &lt; swordsHeld; i++) {
                g2.drawImage(swordItemImg, sx - i * 18, 8, 16, 16, null);
            }
        }
        // SPACE hint
        if (swordsHeld &gt; 0) {
            g2.setColor(new Color(180, 255, 180, 200));
            g2.setFont(new Font("Monospaced", Font.PLAIN, 11));
            g2.drawString("[SPACE] attack", 16, UI_H - 6);
        }
    }

    void drawTitle(Graphics2D g2) {
        if (bgImg != null) {
            g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 0.25f));
            g2.drawImage(bgImg, 0, 0, W, H, null);
            g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 1f));
        }

        drawMazeWalls(g2, true);

        // Title card

            "Arrow keys / WASD  —  move",

            "",
            "Press ENTER to start"

    void drawGame(Graphics2D g2) {
        // Background
        if (bgImg != null) {
            g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 0.28f));
            g2.drawImage(bgImg, 0, 0, W, H, null);
            g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 1f));
        }

        drawMazeWalls(g2, false);
        drawDots(g2);
        drawPlayer(g2);
        drawOrcs(g2);
        drawAttackArc(g2);
    }

    void drawMazeWalls(Graphics2D g2, boolean faint) {
        for (int r = 0; r &lt; ROWS; r++) {
            for (int c = 0; c &lt; COLS; c++) {
                if (maze != null &amp;&amp; maze[r][c] == 1) {
                    g2.setColor(faint ? new Color(21, 32, 56, 120) : new Color(21, 32, 56));
                    g2.fillRect(c * TILE, r * TILE, TILE, TILE);
                    g2.setColor(faint ? new Color(30, 54, 104, 80) : new Color(30, 54, 104));
                    g2.setStroke(new BasicStroke(1.5f));
                    g2.drawRect(c * TILE + 1, r * TILE + 1, TILE - 2, TILE - 2);
                }
            }
        }
    }

    void drawDots(Graphics2D g2) {
        if (dots == null) return;
        for (Dot d : dots) {
            if (d.eaten) continue;
            int dx = d.col * TILE + TILE / 2;
            int dy = d.row * TILE + TILE / 2;
            if (d.isSword &amp;&amp; swordItemImg != null) {
                // Draw sword pickup scaled up
                int sw = 24, sh = 24;
                g2.drawImage(swordItemImg, dx - sw / 2, dy - sh / 2, sw, sh, null);
            } else {
                // Glow effect
                g2.setColor(new Color(255, 215, 0, 80));
                g2.fillOval(dx - 6, dy - 6, 12, 12);
                g2.setColor(new Color(255, 215, 0));
                g2.fillOval(dx - 4, dy - 4, 8, 8);
            }
        }
    }

    void drawPlayer(Graphics2D g2) {
        if (player == null) return;
        int px = (int) player.x, py = (int) player.y;

        if (player.dead) {
            // Flash red
            long t = System.currentTimeMillis();
            if ((t / 120) % 2 == 0) {
                g2.setColor(new Color(255, 60, 60, 180));
                g2.fillOval(px - 20, py - 20, 40, 40);
            }
            return;
        }

        BufferedImage[] frames = soldierWalkFrames;
        if (frames == null) {
            g2.setColor(new Color(70, 160, 255));
            g2.fillOval(px - 18, py - 18, 36, 36);
            return;
        }

        int fi = player.frame % frames.length;
        drawSpriteScaled(g2, frames[fi], px, py, player.facing, 0.72);
    }

    void drawOrcs(Graphics2D g2) {
        if (orcs == null) return;
        for (Orc o : orcs) {
            int ox = (int) o.x, oy = (int) o.y;

            if (o.dead) {
                if (o.deathTimer &lt;= 0) continue;
                float alpha = Math.max(0, o.deathTimer / 800f);
                g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, alpha));
            } else if (!o.active) {
                g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 0.3f));
            }

            if (orcWalkFrames != null) {
                int fi = o.frame % orcWalkFrames.length;
                drawSpriteScaled(g2, orcWalkFrames[fi], ox, oy, o.facing, 0.70);
            } else {
                g2.setColor(new Color(200, 80, 40));
                g2.fillOval(ox - 18, oy - 18, 36, 36);
            }

            g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 1f));
        }
    }

    void drawAttackArc(Graphics2D g2) {
        if (!attackActive || player == null) return;
        int px = (int) player.x, py = (int) player.y;
        float progress = 1f - attackTimer / (float) ATTACK_DUR;
        float alpha = 0.55f * (1f - progress);
        g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, alpha));
        g2.setColor(new Color(255, 240, 100));
        int r = ATTACK_RANGE;
        // Draw arc in facing direction
        int startAngle = player.facing &gt; 0 ? -60 : 120;
        g2.fillArc(px - r, py - r, r * 2, r * 2, startAngle, 120);
        // Sword sprite on arc
        if (swordItemImg != null) {
            int sx = px + (int)(player.facing * r * 0.7);
            g2.drawImage(swordItemImg, sx - 12, py - 12, 24, 24, null);
        }
        g2.setComposite(AlphaComposite.getInstance(AlphaComposite.SRC_OVER, 1f));
    }

    void drawLevelBanner(Graphics2D g2) {
        int cx = W / 2, cy = H / 2;
        g2.setColor(new Color(0, 0, 0, 170));
        g2.fillRoundRect(cx - 160, cy - 40, 320, 80, 18, 18);
        g2.setColor(new Color(255, 215, 0));
        g2.setFont(new Font("Monospaced", Font.BOLD, 32));
        String msg = "LEVEL " + level;
        FontMetrics fm = g2.getFontMetrics();
        g2.drawString(msg, cx - fm.stringWidth(msg) / 2, cy + 12);
    }

    void drawGameOver(Graphics2D g2) {
        int cx = W / 2, cy = H / 2;
        g2.setColor(new Color(0, 0, 0, 200));
        g2.fillRoundRect(cx - 200, cy - 100, 400, 210, 24, 24);
        g2.setColor(new Color(255, 60, 60));
        g2.setFont(new Font("Monospaced", Font.BOLD, 44));
        FontMetrics fm = g2.getFontMetrics();
        g2.drawString("GAME OVER", cx - fm.stringWidth("GAME OVER") / 2, cy - 24);
        g2.setColor(new Color(255, 215, 0));
        g2.setFont(new Font("Monospaced", Font.BOLD, 22));
        fm = g2.getFontMetrics();
        String sc = "Score: " + score;
        g2.drawString(sc, cx - fm.stringWidth(sc) / 2, cy + 20);
        g2.setColor(new Color(180, 210, 255));
        g2.setFont(new Font("Monospaced", Font.PLAIN, 16));
        fm = g2.getFontMetrics();
        String restart = "Press ENTER to play again";
        g2.drawString(restart, cx - fm.stringWidth(restart) / 2, cy + 68);
    }

    // ── Sprite drawing helper ─────────────────────────────────────────────────
    void drawSpriteScaled(Graphics2D g2, BufferedImage img, int cx, int cy, int facing, double scale) {
        int dw = (int)(img.getWidth() * scale);
        int dh = (int)(img.getHeight() * scale);
        if (facing &lt; 0) {
            g2.drawImage(img, cx + dw / 2, cy - dh / 2, -dw, dh, null);
        } else {
            g2.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh, null);
        }
    }

    // ── Key handling ─────────────────────────────────────────────────────────
    @Override public void keyPressed(KeyEvent e) {
        int k = e.getKeyCode();
        if (k &lt; keys.length) keys[k] = true;

        if (screen == SCREEN_TITLE) {
            if (k == KeyEvent.VK_ENTER) {
                lives = 3; score = 0; level = 1;
                initLevel();
                screen = SCREEN_PLAY;
                gameRunning = true;
            }
            return;
        }
        if (screen == SCREEN_OVER) {
            if (k == KeyEvent.VK_ENTER) {
                lives = 3; score = 0; level = 1;
                initLevel();
                screen = SCREEN_PLAY;
                gameRunning = true;
            }
            return;
        }

        // In-game controls
        if (player == null) return;
        if (k == KeyEvent.VK_UP    || k == KeyEvent.VK_W) player.nextDir = 0;
        if (k == KeyEvent.VK_RIGHT || k == KeyEvent.VK_D) { player.nextDir = 1; }
        if (k == KeyEvent.VK_DOWN  || k == KeyEvent.VK_S) player.nextDir = 2;
        if (k == KeyEvent.VK_LEFT  || k == KeyEvent.VK_A) { player.nextDir = 3; }
        if (k == KeyEvent.VK_SPACE) doAttack();
    }

    @Override public void keyReleased(KeyEvent e) { if (e.getKeyCode() &lt; keys.length) keys[e.getKeyCode()] = false; }
    @Override public void keyTyped(KeyEvent e) {}
}

// Entity base
class Entity {
    double x, y;
    int dir = 1;
    int facing = 1;
    double speed = 100;
    int frame = 0, frameTimer = 0, frameDur = 100, frameCount = 8;
}

class Player extends Entity {
    int nextDir = 1;
    boolean dead = false;
    int deathTimer = 0;

    Player(int col, int row) {
        x = col * GamePanel.TILE + GamePanel.TILE / 2.0;
        y = row * GamePanel.TILE + GamePanel.TILE / 2.0;
        speed = 115;
        frameDur = 95;
        frameCount = 8;
    }
}

class Orc extends Entity {
    int index;
    boolean active = false;
    long releaseTime;
    boolean dead = false;
    int deathTimer = 0;

    Orc(int col, int row, int index) {
        x = col * GamePanel.TILE + GamePanel.TILE / 2.0;
        y = row * GamePanel.TILE + GamePanel.TILE / 2.0;
        this.index = index;
        dir = (index &lt; 2) ? 2 : 0;
        facing = (index == 1 || index == 3) ? -1 : 1;
        frameDur = 130;
        frameCount = 8;
    }
}

class Dot {
    int col, row;
    boolean eaten = false;
    boolean isSword = false;

    Dot(int col, int row) {
        this.col = col;
        this.row = row;
    }
}

function showTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('game-panel').style.display=t==='game'?'block':'none';
  document.getElementById('code-panel').style.display=t==='code'?'block':'none';
  if(t==='code'){
    document.querySelectorAll('.tab')[1].classList.add('active');
    if(!document.getElementById('code-pre').textContent){
      document.getElementById('code-pre').textContent=JAVA_CODE.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    }
  } else document.querySelectorAll('.tab')[0].classList.add('active');
}

const imgs={};
function loadImg(key,src){return new Promise(r=>{const i=new Image();i.onload=()=>{imgs[key]=i;r()};i.onerror=r;i.src=src;});}
function splitSheet(img,n){const fw=img.width/n,h=img.height,c=document.createElement('canvas');c.width=fw;c.height=h;const frames=[];for(let i=0;i<n;i++){const f=document.createElement('canvas');f.width=fw;f.height=h;f.getContext('2d').drawImage(img,i*fw,0,fw,h,0,0,fw,h);frames.push(f);}return frames;}

let soldierFrames,orcFrames,swordImg,bgImg2;
let maze2,dots,player,orcs;
let lives=3,score=0,level=1;
let swordsHeld=0,attackActive=false,attackTimer=0;
let screen='title'; // title play over
let transitioning=false;
let lastTime=0;

function canMove(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS&&maze2[r][c]===0;}
function tileCX(c){return c*TILE+TILE/2;}
function tileCY(r){return r*TILE+TILE/2;}
function pixToCol(x){return Math.round((x-TILE/2)/TILE);}
function pixToRow(y){return Math.round((y-TILE/2)/TILE);}

function initLevel(){
  maze2=MAZE.map(r=>[...r]);
  dots=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(maze2[r][c]===0)dots.push({c,r,eaten:false,isSword:false});
  const swordCount=Math.max(0,5-(level-1));
  const cands=dots.filter(d=>!(d.c===9&&d.r===7));
  for(let i=cands.length-1;i>0;i--){const j=Math.random()*i|0;[cands[i],cands[j]]=[cands[j],cands[i]];}
  for(let i=0;i<Math.min(swordCount,cands.length);i++)cands[i].isSword=true;

  player={x:tileCX(9),y:tileCY(7),dir:1,nextDir:1,facing:1,speed:115,frame:0,frameTimer:0,dead:false,deathTimer:0};
  swordsHeld=0;attackActive=false;attackTimer=0;

  const corners=[[1,1],[18,1],[1,13],[18,13]];
  const now=Date.now();
  orcs=corners.map((p,i)=>({
    x:tileCX(p[0]),y:tileCY(p[1]),dir:i<2?2:0,facing:i===1||i===3?-1:1,
    speed:70+i*8+(level-1)*5,frame:0,frameTimer:0,
    active:false,releaseTime:now+ORC_RELEASE[i],dead:false,deathTimer:0
  }));
  transitioning=false;
}

function doAttack(){
  if(screen!=='play'||player.dead||swordsHeld<=0||attackActive)return;
  swordsHeld--;attackActive=true;attackTimer=ATTACK_DUR;
  for(const o of orcs){
    if(o.dead||!o.active)continue;
    const dx=o.x-player.x,dy=o.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<ATTACK_RANGE){o.dead=true;o.deathTimer=800;score+=200;}
  }
  updateUI();
}

function moveEntity(ent,dt,isPlayer){
  ent.frameTimer+=dt;
  if(ent.frameTimer>=110){ent.frameTimer=0;ent.frame=(ent.frame+1)%8;}
  if(isPlayer){
    const nd=DIRS[ent.nextDir];
    const tc=pixToCol(ent.x),tr=pixToRow(ent.y);
    if(canMove(tc+nd[0],tr+nd[1])){
      if(nd[0]!==0)ent.y=tileCY(tr);
      if(nd[1]!==0)ent.x=tileCX(tc);
      ent.dir=ent.nextDir;
      if(nd[0]!==0)ent.facing=nd[0];
    }
  } else {
    const oc=pixToCol(ent.x),or_=pixToRow(ent.y);
    if(Math.abs(ent.x-tileCX(oc))<2&&Math.abs(ent.y-tileCY(or_))<2){
      ent.x=tileCX(oc);ent.y=tileCY(or_);
      const rev=(ent.dir+2)%4;
      const valid=[],any=[];
      for(let i=0;i<4;i++){
        if(canMove(oc+DIRS[i][0],or_+DIRS[i][1])){any.push(i);if(i!==rev)valid.push(i);}
      }
      const ch=valid.length?valid:any;
      if(ch.length){
        const pc=pixToCol(player.x),pr=pixToRow(player.y);
        if(Math.random()<0.65){
          let best=ch[0],bd=1e9;
          for(const di of ch){const d2=Math.abs(oc+DIRS[di][0]-pc)+Math.abs(or_+DIRS[di][1]-pr);if(d2<bd){bd=d2;best=di;}}
          ent.dir=best;
        }else ent.dir=ch[Math.random()*ch.length|0];
        if(DIRS[ent.dir][0]!==0)ent.facing=DIRS[ent.dir][0];
      }
    }
  }
  const d=DIRS[ent.dir];
  const nx=ent.x+d[0]*ent.speed*dt/1000,ny=ent.y+d[1]*ent.speed*dt/1000;
  const nc=pixToCol(nx),nr=pixToRow(ny);
  if(canMove(nc,nr)){
    ent.x=nx;ent.y=ny;
    const tc=pixToCol(ent.x),tr=pixToRow(ent.y);
    if(d[0]!==0)ent.y=tileCY(tr);
    if(d[1]!==0)ent.x=tileCX(tc);
  }else{ent.x=tileCX(pixToCol(ent.x));ent.y=tileCY(pixToRow(ent.y));}
}

function update(dt){
  if(transitioning||screen!=='play')return;
  const now=Date.now();
  if(player.dead){
    player.deathTimer-=dt;
    if(player.deathTimer<=0){lives--;updateUI();if(lives<=0){screen='over';showMsg('GAME OVER','Score: '+score,'ENTER to play again','#f55');return;}initLevel();}
    return;
  }
  if(attackActive){attackTimer-=dt;if(attackTimer<=0)attackActive=false;}
  moveEntity(player,dt,true);
  const pc=pixToCol(player.x),pr=pixToRow(player.y);
  for(const d of dots){
    if(!d.eaten&&d.c===pc&&d.r===pr){
      d.eaten=true;
      if(d.isSword){swordsHeld++;updateUI();}
      else{score+=10;updateUI();}
    }
  }
  if(dots.every(d=>d.eaten)){
    level++;transitioning=true;updateUI();
    showMsg('LEVEL '+level,'','',  '#ffd700');
    setTimeout(()=>{initLevel();hideMsgElem();setTimeout(()=>{transitioning=false;},200);},900);
    return;
  }
  for(const o of orcs){
    if(o.dead){o.deathTimer-=dt;continue;}
    if(!o.active){if(now>=o.releaseTime)o.active=true;else continue;}
    moveEntity(o,dt,false);
    const dx=o.x-player.x,dy=o.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<TILE*0.68&&!player.dead){player.dead=true;player.deathTimer=1800;}
  }
}

function drawSprite(ctx,frames,frameIdx,cx,cy,facing,scale){
  if(!frames||!frames.length)return;
  const f=frames[frameIdx%frames.length];
  const dw=f.width*scale,dh=f.height*scale;
  ctx.save();ctx.translate(cx,cy);
  if(facing<0)ctx.scale(-1,1);
  ctx.drawImage(f,-dw/2,-dh/2,dw,dh);
  ctx.restore();
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function draw(){
  ctx.clearRect(0,0,W,H);
  if(bgImg2){ctx.globalAlpha=0.26;ctx.drawImage(bgImg2,0,0,W,H);ctx.globalAlpha=1;}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(maze2&&maze2[r][c]===1){
      ctx.fillStyle='#152038';ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
      ctx.strokeStyle='#1e3668';ctx.lineWidth=1.5;ctx.strokeRect(c*TILE+1,r*TILE+1,TILE-2,TILE-2);
    }
  }
  if(dots)for(const d of dots){
    if(d.eaten)continue;
    const dx=d.c*TILE+TILE/2,dy=d.r*TILE+TILE/2;
    if(d.isSword&&swordImg){ctx.drawImage(swordImg,dx-14,dy-14,28,28);}
    else{ctx.fillStyle='rgba(255,215,0,0.25)';ctx.beginPath();ctx.arc(dx,dy,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(dx,dy,4.5,0,Math.PI*2);ctx.fill();}
  }
  if(orcs)for(const o of orcs){
    if(o.dead&&o.deathTimer<=0)continue;
    const alpha=o.dead?Math.max(0,o.deathTimer/800):o.active?1:0.28;
    ctx.globalAlpha=alpha;
    if(orcFrames)drawSprite(ctx,orcFrames,o.frame,o.x,o.y,o.facing,0.70);
    else{ctx.fillStyle='#c84';ctx.beginPath();ctx.arc(o.x,o.y,18,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }
  if(player){
    if(player.dead){
      if(Date.now()/120%2<1){ctx.fillStyle='rgba(255,60,60,.7)';ctx.beginPath();ctx.arc(player.x,player.y,20,0,Math.PI*2);ctx.fill();}
    }else{
      if(soldierFrames)drawSprite(ctx,soldierFrames,player.frame,player.x,player.y,player.facing,0.72);
      else{ctx.fillStyle='#4af';ctx.beginPath();ctx.arc(player.x,player.y,18,0,Math.PI*2);ctx.fill();}
    }
  }
  if(attackActive&&player&&!player.dead){
    const prog=1-attackTimer/ATTACK_DUR;
    ctx.globalAlpha=0.5*(1-prog);
    ctx.fillStyle='#ffe060';
    const ang=player.facing>0?-Math.PI/3:Math.PI/1.5;
    ctx.beginPath();ctx.moveTo(player.x,player.y);ctx.arc(player.x,player.y,ATTACK_RANGE,ang,ang+Math.PI*2/3);ctx.closePath();ctx.fill();
    if(swordImg){ctx.globalAlpha=0.9*(1-prog);ctx.drawImage(swordImg,player.x+(player.facing>0?30:-50),player.y-24,20,20);}
    ctx.globalAlpha=1;
  }
}

function updateUI(){
  document.getElementById('lives-el').innerHTML='&#9829; '+lives;
  document.getElementById('score-el').textContent='SCORE '+score;
  document.getElementById('level-el').textContent='LVL '+level;
  const sb=document.getElementById('sword-bar');
  sb.innerHTML='';
  if(swordsHeld>0){
    const hint=document.createElement('span');hint.style.color='#aef';hint.style.marginRight='6px';hint.style.fontSize='11px';hint.textContent='[SPACE]';
    sb.appendChild(hint);
    for(let i=0;i<swordsHeld;i++){if(swordImg){const im=new Image();im.src=swordImg.src;im.style.cssText='width:16px;height:16px;margin-right:2px';sb.appendChild(im);}};
  }
}

const msgEl=document.getElementById('msg');
function showMsg(title,sub,hint,col){
  msgEl.style.display='block';
  msgEl.innerHTML=`<div style="font-size:32px;color:${col||'#ffd700'};letter-spacing:3px;font-weight:bold">${title}</div>`
    +(sub?`<div style="margin:8px 0 4px;color:#ffd700;font-size:20px">${sub}</div>`:'')
    +(hint?`<div style="margin-top:10px;color:#aef;font-size:15px">${hint}</div>`:'');
}
function hideMsgElem(){msgEl.style.display='none';}

function loop(ts){
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  if(screen==='play')update(dt);
  if(screen==='play'||screen==='over')draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(screen==='title'||screen==='over'){
    if(e.key==='Enter'){
      if(screen==='over'){lives=3;score=0;level=1;}
      initLevel();screen='play';hideMsgElem();updateUI();
    }
    return;
  }
  if(!player)return;
  const m={ArrowUp:0,w:0,W:0,ArrowRight:1,d:1,D:1,ArrowDown:2,s:2,S:2,ArrowLeft:3,a:3,A:3};
  if(e.key in m){player.nextDir=m[e.key];e.preventDefault();}
  if(e.key===' '){doAttack();e.preventDefault();}
});

let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!player)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy))player.nextDir=dx>0?1:3;
  else player.nextDir=dy>0?2:0;
},{passive:true});

Promise.all([loadImg('sw',SOLDIER_WALK),loadImg('ow',ORC_WALK),loadImg('bg',BG_IMG),loadImg('sv',SWORD_IMG)]).then(()=>{
  soldierFrames=splitSheet(imgs.sw,8);
  orcFrames=splitSheet(imgs.ow,8);
  bgImg2=imgs.bg;
  swordImg=imgs.sv;
  initLevel();
  requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
});
</script>
</body>
</html>
